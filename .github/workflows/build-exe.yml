name: Build Case Exporter

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 安装依赖
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller playwright openpyxl requests pycryptodome

      # 安装 Playwright
      - name: Install Playwright Browser
        run: |
          playwright install chromium

      # 打包 EXE
      - name: Build EXE
        run: |
          pyinstaller --onefile --clean --name case_exporter --hidden-import=playwright --hidden-import=playwright.sync_api export_cases.py

      # 上传 EXE
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: case_exporter_exe
          path: dist/case_exporter.exe
