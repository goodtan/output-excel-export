name: Build Case Exporter

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests pycryptodome openpyxl

      - name: Build EXE
        run: |
          pyinstaller --onefile --clean --name case_exporter export_cases.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: case_exporter_exe
          path: dist/case_exporter.exe
